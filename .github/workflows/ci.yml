name: CI

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main"]

# Restrict GITHUB_TOKEN to read-only at workflow level. Jobs that need
# write access (publish, deploy) declare their own `permissions:` block.
permissions:
  contents: read

jobs:
  test:
    name: Lint + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint with ruff
        run: uv run ruff check graphforge/ tests/

      - name: Run tests with coverage
        run: uv run pytest -v --tb=short --cov=graphforge --cov-report=term-missing --cov-fail-under=95

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: .coverage
